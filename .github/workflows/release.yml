name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LAST=$(git tag --sort=-version:refname | grep '^v' | head -1)
          if [ -z "$LAST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo $LAST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LAST | cut -d. -f2)
            PATCH=$(echo $LAST | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "prev=$LAST" >> $GITHUB_OUTPUT

      - name: Build changelog from commits
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.prev }}"
          if [ -z "$PREV" ]; then
            LOGS=$(git log --pretty=format:"- %s" HEAD)
          else
            LOGS=$(git log --pretty=format:"- %s" "$PREV"..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$LOGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          mkdir rchelper
          cp manifest.json content.js popup.html popup.js background.js \
             icon16.png icon48.png icon128.png favicon.ico README.md LICENSE \
             rchelper/
          zip -r rchelper.zip rchelper/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RC Helper ${{ steps.version.outputs.tag }}
          body: |
            ## 🚀 RC Helper ${{ steps.version.outputs.tag }}

            ### Değişiklikler
            ${{ steps.changelog.outputs.notes }}

            ---
            > Chrome'a yüklemek için `rchelper.zip` dosyasını indirip `chrome://extensions` → **Paketlenmemiş öğe yükle** ile kurun.
          files: rchelper.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
